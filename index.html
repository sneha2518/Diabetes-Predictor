<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Predictor</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0px 0px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: 600;
            margin-top: 10px;
            display: block;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        .result {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        small {
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🩺 Diabetes Prediction System 💙</h2>

    <form action="/predict" method="post">

        <label>🤰 Number of Pregnancies</label>
        <input type="number" name="Pregnancies" min="0" placeholder="e.g., 2" required>

        <label>🍬 Sugar Level (Glucose)</label>
        <input type="number" name="Glucose" min="0" placeholder="e.g., 120" required>

        <label>💓 Blood Pressure</label>
        <input type="number" name="BloodPressure" min="0" placeholder="e.g., 70" required>

        <label>🧴 Skin Thickness</label>
        <input type="number" name="SkinThickness" min="0" placeholder="e.g., 20" required>

        <label>💉 Insulin Level</label>
        <input type="number" name="Insulin" min="0" placeholder="e.g., 80" required>

        <label>⚖️ Body Weight (BMI)</label>
        <input type="number" step="any" name="BMI" min="0" placeholder="e.g., 25.5" required>
        <small>Normal range: 18.5 – 30</small>

        <label>🧬 Family History of Diabetes</label>
        <input type="number" step="any" name="DiabetesPedigreeFunction" min="0" placeholder="0.0 – 2.0" required>

        <label>🎂 Age</label>
        <input type="number" name="Age" min="0" placeholder="e.g., 35" required>

        <button type="submit">🔮 Predict Now</button>

    </form>

    <div class="result">
        {{ prediction_text }}
    </div>

</div>

</body>
</html>
